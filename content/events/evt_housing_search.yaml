id: evt_housing_search
kind: action
title: Look into transitional housing
tags: [housing]
requires_travel: true
repeatable: true

# The transitional-housing rung of the housing ladder (§6): the accessible step up
# from a shelter or a couch. Gated on the ladder rank (tracks.housing.readiness) so
# it stops being offered once you've climbed past it; the rental rung is
# evt_own_place. Registry builds route through evt_housing_registry.
conditions:
  - flags.registry_required == false
  - tracks.housing.readiness < 3

prompt: >
  Wherever you're laying your head, it isn't yours and it won't last. There's a
  transitional-housing program — a bed, a caseworker, rules and a curfew, but a
  place that's actually yours for a while. Worth the trip across town.

choices:

  - id: apply_transitional
    quality: durable
    label: Apply to a transitional-housing program
    cost: { slots: 1 }
    outcomes:
      - weight: 65
        modifier: { stat: social_capital, scale: 0.2 }
        effects:
          text: >
            A caseworker, an intake form, a bed with your name on it. Rules and a
            curfew, but a door that's yours to come home to.
          pools: { morale: 10 }
          tracks: { housing: { status: transitional } }
      - weight: 35
        effects:
          text: >
            Waitlisted. "Check back in a few weeks." The bed is real; the timing
            isn't yours yet.
          pools: { morale: -4 }
