id: evt_apply_job_onboarding
kind: action
title: The dev gig the program referred
tags: [employment]
repeatable: true   # an HR stall (interviewing) shouldn't end the search — retry
                   # until the condition below (has_job) retires it.

conditions:
  - flags.has_state_id == true
  - flags.has_job == false
  - flags.registry_required == false   # registry builds face evt_job_registry instead
  - flags.has_cert_webdev == true      # the web-dev-specific payoff; others get evt_get_hired

prompt: >
  The cert program left you a contact: a small shop that hires its graduates for
  junior remote work. With an ID in hand you can onboard — paperwork, direct deposit,
  prove you're you. But remote work needs a machine to do it on, and the skills were
  never the problem; the gear is.

choices:

  - id: onboard_dev
    quality: durable
    label: Onboard for the remote dev role
    requires:
      - flags.has_cert_webdev == true
      - flags.tech_gap == false
      - flags.has_laptop == true       # remote dev work needs a computer — the catch-22
    cost: { slots: 1 }
    outcomes:
      - weight: 70
        modifier: { stat: morale, scale: 0.2 }
        effects:
          text: >
            Paperwork clears. There's a paycheck on the calendar now — small, but
            real, and yours.
          flags: { has_job: true }
          pools: { morale: 16, money: 10 }
          tracks: { employment: { status: employed } }
      - weight: 30
        effects:
          text: >
            The background check stalls it in HR. Not a no — a "we'll be in
            touch." You've got a live lead and a knot in your stomach.
          pools: { morale: -5 }
          tracks: { employment: { status: interviewing } }

  - id: apply_broadly
    quality: desperate
    label: Skip it and take whatever pays this week
    cost: { slots: 1 }
    outcomes:
      - weight: 100
        effects:
          text: >
            You pick up shift work that doesn't ask many questions — cash in hand this
            week, and a tax on the back that already hurts. It's a stopgap, not a job:
            the real role (and day labor) are still there to come back to.
          pools: { money: 14, health: -8 }
