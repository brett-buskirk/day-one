# nginx server block for Day One (a static, client-rendered PWA).
# Used by the Dockerfile, and a good template for a bare-metal nginx host
# (drop it in /etc/nginx/conf.d/ and point `root` at your built dist/).

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;   # bare metal: change to your dist/ path
    index index.html;

    # The app has no server-side routes — serve index.html for any unknown path.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Never cache the entry point or the service worker, so clients pick up new
    # builds immediately instead of being stuck on a stale cached shell.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
    location = /sw.js {
        add_header Cache-Control "no-cache";
    }

    # Ensure the manifest is served with the right MIME type + fresh.
    location = /manifest.webmanifest {
        types { }
        default_type application/manifest+json;
        add_header Cache-Control "no-cache";
    }

    # Vite emits content-hashed filenames under /assets — safe to cache forever.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    gzip on;
    gzip_comp_level 6;
    gzip_types text/css application/javascript application/json image/svg+xml application/manifest+json;
}
