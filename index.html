<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0f3d3e" />
    <meta name="color-scheme" content="light dark" />

    <!-- Apply the saved appearance before first paint (no flash). Mirrors -->
    <!-- src/theme.ts; keep the storage keys in sync. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem("dayone:theme");
          if (t !== "light" && t !== "dark") {
            t = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
          }
          var a = localStorage.getItem("dayone:accent") || "teal";
          var r = document.documentElement;
          r.setAttribute("data-theme", t);
          r.setAttribute("data-accent", a);
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "light");
          document.documentElement.setAttribute("data-accent", "teal");
        }
      })();
    </script>
    <meta
      name="description"
      content="Live the first ninety days of reentry, one week at a time."
    />

    <!-- PWA: public/manifest.webmanifest is the source of truth (vite.config -->
    <!-- keeps the service worker; the manifest stays hand-authored here). -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Day One" />

    <title>Day One</title>
  </head>
  <body>
    <div id="root"></div>
    <noscript>Day One needs JavaScript enabled to run.</noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
