id: evt_birth_cert_arrives
kind: incident
title: The mail comes
tags: [documents]
repeatable: false

prompt: >
  A thin envelope from Vital Records is waiting in the stack on the kitchen
  counter. Your birth certificate.

choices:
  - id: open_it
    label: Open it
    outcomes:
      - weight: 100
        effects:
          text: >
            One document down. The DMV's "apply" path is within reach now — you
            just need proof of address to go with it.
          flags: { has_birth_cert: true }
          pools: { morale: 5 }
