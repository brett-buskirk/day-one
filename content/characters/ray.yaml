id: ray
name: Ray
display_age: 58
summary: >
  Twenty-four years inside — long enough that the world rebuilt its front door
  while he was gone. A registry requirement, the people who'd have caught him
  mostly passed on or moved on, a back the prison never did fix, and the quiet
  weight of all those years. What he does have: a stack of certifications and a
  GED earned over two decades, and a little money saved from a lifetime of prison
  wages. The deepest end — where the skills are real and almost everything around
  using them has been taken away.

time_inside_years: 24

