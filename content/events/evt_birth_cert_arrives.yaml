id: evt_birth_cert_arrives
kind: incident
title: The mail comes
tags: [documents]
repeatable: false

prompt: >
  A thin envelope from Vital Records is waiting in the stack on the kitchen
  counter. Your birth certificate.

choices:
  - id: open_it
    label: Open it
    outcomes:
      - weight: 100
        effects:
          text: >
            One document down. The DMV's "apply" path is within reach now — bring
            this birth certificate and proof of address, and you can get the ID itself.
          flags: { has_birth_cert: true, awaiting_birth_cert: false }
          pools: { morale: 5 }
