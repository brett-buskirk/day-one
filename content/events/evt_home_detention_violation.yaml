id: evt_home_detention_violation
kind: incident
title: A home-detention violation is filed
tags: [legal, crisis]

# Routed from a missed home-detention check-in (VIOLATION_EVENTS). Home detention has a
# sharp edge — a breach can swap the ankle monitor for a cell. Recoverable; not nothing.
prompt: >
  The missed check-in went into the record. Home detention has a short fuse — a violation
  can mean revocation, the monitor traded for a cell. It's recoverable. It's also the kind
  of thing that gets people sent back.

choices:

  - id: own_it_recommit
    quality: durable
    label: Get ahead of it — call counsel, show good faith
    cost: { slots: 1 }
    outcomes:
      - weight: 70
        modifier: { stat: morale, scale: 0.2 }
        effects:
          text: >
            You don't wait for the summons; you call, you document, you show up early with
            a plan. They keep the leash; your standing holds.
          pools: { morale: -4 }
          tracks: { legal: { status: home_detention, readiness: 12 } }
      - weight: 30
        effects:
          text: >
            A hearing and a stern warning on the record. Tighter conditions, a shorter
            rope — but you're still walking out of the building.
          pools: { morale: -7 }
          tracks: { legal: { status: home_detention, readiness: 4 } }

  - id: lay_low
    quality: desperate
    label: Hope they're too busy to follow up
    outcomes:
      - weight: 55
        effects:
          text: >
            The filing sits and your standing sinks with it. Pretending it isn't there has
            never once made it not there.
          pools: { morale: -5 }
          tracks: { legal: { status: home_detention, readiness: -8 } }
      - weight: 45
        modifier: { stat: social_capital, scale: 0.2 }
        effects:
          text: >
            An overloaded caseload buys you a pass this once. Nothing changes on paper. Do
            not mistake luck for a plan.
          tracks: { legal: { status: home_detention, readiness: -2 } }
