name: CI

# Runs on every PR into main and on pushes to main. Keep main green — branch
# protection requires this to pass before a PR can merge.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate + compile content
        run: npm run build:content

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Production build
        run: npm run build
