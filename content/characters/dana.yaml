summary: >
  A short year inside, and now three years of probation trailing it — weekly
  court check-ins, supervision fees pulled from money she doesn't have, and home
  detention: an ankle monitor with a weekly fee that bleeds her, and a week she
  mostly can't leave. No registry, but the record still closes doors. Back at her
  mom's, rebuilding the paper trail like everyone else. A build for the weight — and
  the relentless cost — of supervision itself.

