id: evt_license_restore
kind: action
title: Get your license back
tags: [transportation, legal, money]

# A license suspended over unpaid fines is one of the quietest reentry traps. Clearing
# it is *permission* to drive, not a vehicle — a modest mobility bump (you can borrow or
# rent now and then); a car of your own is evt_get_car, gated behind this. Not offered
# to the long-timer, whose license lapsed decades ago (tech_gap).
conditions:
  - flags.has_license == false
  - flags.tech_gap == false
  - pools.transportation < 70

prompt: >
  Old traffic fines suspended your license years back, and the balance only grew
  while you were away. The clerk says you can clear it — pay it down, or set up a
  plan — and you're cleared to drive again. (The license is the permission; a car of
  your own is a separate problem. But it's the door that's been shut.)

choices:

  - id: pay_in_full
    quality: durable
    label: Clear the fines and reinstate it
    requires:
      - pools.money >= 40
    cost: { money: 40 }
    outcomes:
      - weight: 100
        effects:
          text: >
            Receipt in hand, license reinstated. A real bite out of what little you
            had — but you can legally drive again, the day you get your hands on a car.
          flags: { has_license: true }
          pools: { transportation: 12, morale: 8 }

  - id: payment_plan
    quality: durable
    label: Set up a hardship payment plan
    requires:
      - pools.money >= 12
    cost: { money: 12 }
    outcomes:
      - weight: 80
        modifier: { stat: social_capital, scale: 0.15 }
        effects:
          text: >
            They take a first payment and a signature and hand your license back on
            the promise of the rest. Cleared to drive — with a tab still running, and
            still no car in the driveway.
          flags: { has_license: true }
          pools: { transportation: 10, morale: 4 }
      - weight: 20
        effects:
          text: >
            The plan needs more down than you can spare today. You leave with a form
            to bring back when the money's there.
          pools: { morale: -3 }
