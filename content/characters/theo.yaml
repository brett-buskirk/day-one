id: theo
name: Theo
display_age: 47
summary: >
  Eleven years in, home to a registry requirement that draws the map of where he's
  allowed to be — which addresses, which jobs, how close to which buildings. The
  skills and the will are there; the law keeps shrinking the ground he can rebuild
  on. The deliberate deep-end build: the wall is the rule, and it's almost
  everywhere. (Offense modeled as a barrier only — never a judgment of the person.)

