id: evt_vso_support
kind: action
title: Check in with the VSO
tags: [relationships, support]
repeatable: true

# A Veterans Service Organization — and the battle buddies in it — is a support no civilian
# program quite matches: people who were there, who get the 3am of it. The veteran's earned
# support routine. Gated on veteran; sets kept_support_routine like the recovery/community paths.
conditions:
  - flags.veteran == true

prompt: >
  The VSO hall smells like burnt coffee and is half-full of men who don't have to be told. Someone
  who carried the same weight, who can cut through the VA's maze, who'll just sit with you a while.
  You don't have to explain yourself here. That's the whole point.

choices:

  - id: show_up
    quality: durable
    label: Show up — these are your people
    cost: { slots: 1 }
    outcomes:
      - weight: 100
        effects:
          text: >
            An hour of being known, no translation needed. A lead on the VA, a ride offered, a laugh
            you didn't expect. You leave standing straighter — still carrying it, but not alone.
          pools: { morale: 7, social_capital: 5, health: 2 }
          flags: { kept_support_routine: true }
